<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نور - مدرسة الإبداع للبنين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --bg-body: #F4F7F9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1E293B;
            --text-muted: #64748B;
            /* ألوان البطاقة الفخمة */
            --id-bg: #1E2638; /* لون كحلي فاخر */
            --id-gold: #FBBF24;
            --btn-green: #10B981;
            --btn-gray: #F1F5F9;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #E2E8F0 0%, #F8FAFC 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية زجاجية فخمة للواجهة */
        .main-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 45px 35px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 1);
            width: 100%;
            max-width: 520px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* ---------------- قسم البحث (الواجهة الأولى) ---------------- */
        .login-header {
            margin-bottom: 35px;
        }
        
        .school-logo-main {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        
        h2 { font-size: 26px; font-weight: 800; margin: 0 0 5px; color: var(--text-main); letter-spacing: -0.5px; }
        p.subtitle { font-size: 15px; color: var(--text-muted); margin: 0; line-height: 1.6; }

        .input-wrapper { margin-bottom: 25px; }
        .input-wrapper input {
            width: 100%; padding: 18px 20px; 
            background-color: #F8FAFC;
            border: 2px solid #E2E8F0; border-radius: 18px;
            font-size: 18px; font-family: inherit; text-align: center;
            box-sizing: border-box; transition: all 0.3s ease;
            color: var(--text-main); font-weight: 700;
        }
        .input-wrapper input:focus { 
            border-color: var(--primary); 
            background-color: #FFF;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button.btn-main {
            width: 100%; padding: 18px; 
            background: var(--text-main);
            color: white; border: none; border-radius: 18px; font-size: 18px;
            font-weight: 800; cursor: pointer; font-family: inherit; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(30, 41, 59, 0.2);
        }
        button.btn-main:hover { transform: translateY(-2px); background: #0F172A; }

        #errorMessage { color: #EF4444; font-size: 14px; margin-top: 15px; display: none; font-weight: 700; background: #FEF2F2; padding: 10px; border-radius: 10px;}

        /* ---------------- تأثير التحميل الفخم (Loading) ---------------- */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; border-radius: 30px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #E2E8F0;
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        .loading-text { font-weight: 700; color: var(--text-main); font-size: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ---------------- تصميم البطاقة الرسمية (ID Card) ---------------- */
        #resultSection { display: none; }
        
        .id-card-wrapper {
            padding: 12px;
            border: 2px dashed #CBD5E1;
            border-radius: 32px;
            margin-bottom: 25px;
            background-color: white;
        }

        .id-card {
            background: linear-gradient(145deg, var(--id-bg) 0%, #0F172A 100%);
            border-radius: 24px;
            padding: 30px 25px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* زخرفة خلفية البطاقة */
        .id-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        /* المنتصف (الهيدر واسم الطالب) */
        .id-header-centered {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }
        .id-header-text { font-size: 18px; font-weight: 800; color: white; display: block; margin-bottom: 2px;}
        .id-header-sub { font-size: 13px; color: #94A3B8; display: block; }

        .student-name-gold {
            color: var(--id-gold);
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* الأسفل (البيانات والشعار) */
        .id-body-split {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            position: relative;
            z-index: 2;
        }

        .data-pills-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-pill {
            background-color: #FFFFFF;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .pill-label { font-size: 13px; font-weight: 700; color: #64748B; }
        .pill-value { font-size: 16px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
        }
        .noor-logo-box {
            background-color: white;
            width: 80px;
            height: 80px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            padding: 10px;
            box-sizing: border-box;
        }
        .noor-logo-img { width: 100%; height: 100%; object-fit: contain; }
        .scan-text { font-size: 11px; font-weight: 700; text-align: center; color: #CBD5E1; }

        /* ---------------- الأزرار السفلية ---------------- */
        .action-buttons { display: flex; gap: 12px; margin-top: 10px; }
        .btn-action {
            flex: 1; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 15px;
            cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-save { background-color: var(--btn-green); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-save:hover { background-color: #059669; }
        .btn-print { background-color: var(--btn-gray); color: var(--text-main); }
        .btn-print:hover { background-color: #E2E8F0; }
        
        .btn-reset { 
            margin-top: 20px; background: transparent; color: var(--text-muted); 
            border: none; text-decoration: underline; cursor: pointer; 
            font-family: inherit; font-size: 14px; font-weight: 500;
        }

        @media print {
            body { background: white; }
            .main-container { box-shadow: none; max-width: 100%; padding: 0; border: none; }
            #searchSection, .action-buttons, .btn-reset { display: none !important; }
            .id-card-wrapper { border: none; padding: 0; }
            .id-card { box-shadow: none; border: 2px solid #000; background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .id-header-text, .id-header-sub, .pill-label, .scan-text { color: black !important; }
            .student-name-gold { color: black !important; text-shadow: none; }
            .data-pill { border: 2px solid #000; box-shadow: none; }
            .noor-logo-box { border: 2px solid #000; box-shadow: none; }
        }

        @media (max-width: 480px) {
            .main-container { padding: 30px 20px; border-radius: 20px; }
            .id-body-split { flex-direction: column; }
            .data-pills-container { width: 100%; order: 2; }
            .logo-container { order: 1; margin-bottom: 15px; }
            .id-card { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">جاري استخراج البطاقة المعتمدة...</div>
        </div>

        <div id="searchSection">
            <div class="login-header">
                <img src="school-logo.png" alt="شعار المدرسة" class="school-logo-main" onerror="this.style.display='none';">
                <h2>بوابة منصة نور</h2>
                <p class="subtitle">مدرسة الإبداع للبنين (5-8)</p>
            </div>

            <div class="input-wrapper">
                <input type="number" id="civilId" placeholder="أدخل الرقم المدني للطالب..." required>
            </div>

            <button class="btn-main" id="submitBtn" onclick="fetchStudentData()">
                دخول
            </button>
            <div id="errorMessage"></div>
        </div>

        <div id="resultSection">
            
            <div class="id-card-wrapper" id="captureArea">
                <div class="id-card">
                    <div class="id-header-centered">
                        <span class="id-header-text">مدرسة الإبداع للبنين</span>
                        <span class="id-header-sub">بوابة الدخول - منصة نور</span>
                    </div>
                    
                    <div class="student-name-gold" id="resStudentName">---</div>
                    
                    <div class="id-body-split">
                        <div class="data-pills-container">
                            <div class="data-pill">
                                <span class="pill-label">اسم المستخدم:</span>
                                <span class="pill-value" id="resUsername">---</span>
                            </div>
                            <div class="data-pill">
                                <span class="pill-label">كلمة المرور:</span>
                                <span class="pill-value" id="resPassword">---</span>
                            </div>
                        </div>

                        <div class="logo-container">
                            <div class="noor-logo-box">
                                <img src="noor-logo.png" alt="شعار نور" class="noor-logo-img">
                            </div>
                            <div class="scan-text">بطاقة<br>طالب معتمدة</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-print" onclick="window.print()">
                    <span>🖨️</span> طباعة
                </button>
                <button class="btn-action btn-save" onclick="saveAsImage()">
                    <span>📸</span> حفظ البطاقة
                </button>
            </div>

            <button class="btn-reset" onclick="resetForm()">البحث عن طالب آخر</button>
        </div>

    </div>

    <script>
        // ⚠️ ضع رابط واجهة جوجل شيت (API) هنا
      const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxb7pGmD5oKpJ1i1YQ7086EmdIqIGs_sV3LN29TASwJVLZogaN9F_tkX0A7QK8cI0o/exec";

        async function fetchStudentData() {
            const civilIdInput = document.getElementById('civilId').value;
            const errorMessage = document.getElementById('errorMessage');
            const loadingOverlay = document.getElementById('loadingOverlay');

            if (!civilIdInput) {
                errorMessage.innerText = "الرجاء إدخال الرقم المدني أولاً.";
                errorMessage.style.display = 'block';
                return;
            }

            // تفعيل واجهة التحميل الفخمة
            errorMessage.style.display = 'none';
            loadingOverlay.style.display = 'flex';

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ civil_id: civilIdInput })
                });

                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('searchSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    
                    document.getElementById('resStudentName').innerText = result.data.studentName;
                    document.getElementById('resUsername').innerText = result.data.username;
                    document.getElementById('resPassword').innerText = result.data.password;

                } else {
                    errorMessage.innerText = "الرقم المدني غير مسجل، يرجى التأكد والمحاولة مجدداً.";
                    errorMessage.style.display = 'block';
                }

            } catch (error) {
                errorMessage.innerText = "حدث خطأ في الاتصال، يرجى المحاولة بعد لحظات.";
                errorMessage.style.display = 'block';
            } finally {
                // إخفاء واجهة التحميل عند الانتهاء
                loadingOverlay.style.display = 'none';
            }
        }

        // دالة حفظ البطاقة كصورة
        function saveAsImage() {
            const captureArea = document.getElementById('captureArea');
            
            html2canvas(captureArea, {
                scale: 3, 
                backgroundColor: '#ffffff',
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'بطاقة_دخول_نور.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function resetForm() {
            document.getElementById('civilId').value = '';
            document.getElementById('searchSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
